name: ci

on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "NOTICE"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        node:
          - "26"
          - "24"
          - "22"
        typescript:
          - "rc"
          - "next"
          - "6.0"
          - "5.9"
          - "5.8"
          - "5.7"
          - "5.6"
          - "5.5"
          - "5.4"
          - "5.3"
          - "5.2"
          - "5.1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: ${{ matrix.node }}
          # 後段で `vp install --frozen-lockfile` を走らせるため setup-vp の自動 install を無効化する
          run-install: false
      - run: vp install --frozen-lockfile
      - run: vp add -E -D typescript@${{ matrix.typescript }} -w
      - run: vp run build
      - run: vp lint --type-aware
      - run: vp exec tsc --noEmit
      - run: vp test run

  typescript-native-preview:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        version:
          - "latest"
          - "beta"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: "26"
          # 後段で `vp install --frozen-lockfile` を走らせるため setup-vp の自動 install を無効化する
          run-install: false
      - run: vp install --frozen-lockfile
      - run: vp remove -D typescript -w
      - run: vp add -E -D @typescript/native-preview@${{ matrix.version }} -w
      - run: vp exec tsgo --emitDeclarationOnly -p tsconfig.json
      # e2e-tests/tsconfig.json の型チェックは現状 @voidzero-dev/vite-plus-core / vite-plus-test の
      # 型定義が optional な依存 (@vitejs/devtools, @tsdown/exe, @arethetypeswrong/core, publint,
      # @vitest/expect, vitest/optional-types など) を未解決で参照しているため tsgo が大量の TS2307 を出して落ちる。
      # これは Vite+ 0.1.24 側の問題で当リポジトリで修正できないので、 continue-on-error で一時的にスキップする。
      # Vite+ の型定義が更新されたら continue-on-error を外すこと。
      - run: vp exec tsgo --noEmit -p e2e-tests/tsconfig.json
        continue-on-error: true

  slack_notify:
    needs: [ci, typescript-native-preview]
    runs-on: ubuntu-slim
    if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-js-sdk
          notify_mode: failure_and_fixed
