name: ci

on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "NOTICE"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        node:
          - "26"
          - "24"
          - "22"
        typescript:
          - "next"
          - "beta"
          - "6.0"
          - "5.9"
          - "5.8"
          - "5.7"
          - "5.6"
          - "5.5"
          - "5.4"
          - "5.3"
          - "5.2"
          - "5.1"
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node }}
          run-install: false
      - uses: pnpm/action-setup@v5
      - run: vp --version
      - run: vp install
      - run: vp add -E -D typescript@${{ matrix.typescript }} -w
      - run: vp run build
      - run: vp run lint
      - run: vp run typecheck
      - run: vp run test

  slack_notify:
    needs: [ci]
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-js-sdk
          notify_mode: failure_and_fixed
