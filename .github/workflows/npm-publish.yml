name: npm-publish

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*-canary.[0-9]*"

permissions:
  id-token: write
  contents: read

jobs:
  verify-version:
    name: Verify tag matches package.json version
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Compare tag name with package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Tag ${TAG_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Tag ${TAG_NAME} matches package.json version ${PKG_VERSION}"

  build:
    name: Build
    runs-on: ubuntu-slim
    needs: [verify-version]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run typecheck
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sora-js-sdk-dist
          path: dist/

  npm-publish-canary:
    runs-on: ubuntu-slim
    needs: [build]
    permissions:
      contents: read
      id-token: write
    if: ${{ contains(github.ref_name, '-canary.') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sora-js-sdk-dist
          path: dist/

      # pnpm publish は CI では正常に動作しない
      # https://github.com/pnpm/pnpm/issues/4937
      - run: npm install -g npm@latest
      - run: npm publish --no-git-checks --tag canary

  npm-publish:
    runs-on: ubuntu-slim
    needs: [build]
    permissions:
      contents: read
      id-token: write
    if: ${{ !contains(github.ref_name, '-canary.') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sora-js-sdk-dist
          path: dist/

      # pnpm publish は CI では正常に動作しない
      # https://github.com/pnpm/pnpm/issues/4937
      - run: npm install -g npm@latest
      - run: npm publish --no-git-checks

  slack_notify:
    needs: [npm-publish-canary, npm-publish]
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-js-sdk
          notify_mode: failure_and_fixed
