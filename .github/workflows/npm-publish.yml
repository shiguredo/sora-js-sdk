name: npm-publish

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*-canary.[0-9]*"

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify tag matches package.json version
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 22
          # このジョブは `node -p` のみを実行し vp / 依存関係を使わないため自動 install を無効化する
          run-install: false
      - name: Compare tag name with package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Tag ${TAG_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Tag ${TAG_NAME} matches package.json version ${PKG_VERSION}"

  build:
    name: Build
    runs-on: ubuntu-slim
    needs: [verify-version]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 22
          # 後段で `vp install --frozen-lockfile` を走らせるため setup-vp の自動 install を無効化する
          run-install: false
      - run: vp install --frozen-lockfile
      - run: vp run build
      - run: vp lint --type-aware
      - run: vp exec tsc --noEmit
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sora-js-sdk-dist
          path: dist/

  npm-publish-canary:
    runs-on: ubuntu-slim
    needs: [build]
    permissions:
      contents: read
      id-token: write
    if: ${{ contains(github.ref_name, '-canary.') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # このジョブは artifact の dist/ をダウンロードして `npm publish` するだけで vp / 依存関係を使わないため自動 install を無効化する
          run-install: false

      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sora-js-sdk-dist
          path: dist/

      # pnpm publish は CI では正常に動作しない
      # https://github.com/pnpm/pnpm/issues/4937
      - run: npm install -g npm@latest
      - run: npm publish --tag canary --provenance

  npm-publish:
    runs-on: ubuntu-slim
    needs: [build]
    permissions:
      contents: read
      id-token: write
    if: ${{ !contains(github.ref_name, '-canary.') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # このジョブは artifact の dist/ をダウンロードして `npm publish` するだけで vp / 依存関係を使わないため自動 install を無効化する
          run-install: false

      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sora-js-sdk-dist
          path: dist/

      # pnpm publish は CI では正常に動作しない
      # https://github.com/pnpm/pnpm/issues/4937
      - run: npm install -g npm@latest
      - run: npm publish --provenance

  slack_notify:
    needs: [npm-publish-canary, npm-publish]
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-js-sdk
          notify_mode: failure_and_fixed
