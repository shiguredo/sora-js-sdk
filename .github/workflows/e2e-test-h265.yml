name: e2e-test-h265

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - feature/*
    paths:
      - playwright.config.ts
      - .github/workflows/e2e-test-h265.yml
      - e2e-tests/**
  schedule:
    # UTC 時間で毎日 2:00 (JST で 11:00) に実行、月曜日から金曜日
    - cron: "0 2 * * 1-5"

permissions:
  contents: read

jobs:
  # H265 を再生できる Chrome 各バージョン (Stable / Beta / Dev / Canary) で
  # self-hosted Apple Silicon 上でテストする
  # Playwright 経由では Canary / Dev バージョンのブラウザをインストールできないため Homebrew 経由でインストールしている
  e2e-test-h265:
    strategy:
      matrix:
        node:
          # Nodejs のテストではないので一番古い LTS である 22 でのみ動作確認する
          - "22"
        browser:
          - name: "Google Chrome Canary"
            type: "google-chrome@canary"
          - name: "Google Chrome Dev"
            type: "google-chrome@dev"
          - name: "Google Chrome Beta"
            type: "google-chrome@beta"
          - name: "Google Chrome"
            type: "google-chrome"
    env:
      VITE_TEST_SIGNALING_URL: ${{ secrets.TEST_SIGNALING_URL }}
      VITE_TEST_CHANNEL_ID_PREFIX: ${{ secrets.TEST_CHANNEL_ID_PREFIX }}
      VITE_TEST_API_URL: ${{ secrets.TEST_API_URL }}
      VITE_TEST_SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
    runs-on:
      group: Self
      labels: [self-hosted, macOS, ARM64, Apple-M2-Pro]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Homebrew/actions/setup-homebrew@8eb7f2efa6ab636da09aef605b497fd5b8a7587d # master
      - run: brew install --cask ${{ matrix.browser.type}}
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: ${{ matrix.node }}
          # 後段で `vp install --frozen-lockfile` を走らせるため setup-vp の自動 install を無効化する
          run-install: false
      - run: vp install --frozen-lockfile
      - run: vp run build
      - run: vp exec playwright test --project="${{ matrix.browser.name }}" e2e-tests/tests/h265.test.ts
        env:
          VITE_TEST_CHANNEL_ID_SUFFIX: _${{ github.run_id }}_${{ matrix.node }}
      # - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      #   if: always()
      #   with:
      #     name: playwright-report
      #     path: playwright-report/
      #     retention-days: 30

  slack_notify:
    needs: [e2e-test-h265]
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-js-sdk
          notify_mode: failure_and_fixed
