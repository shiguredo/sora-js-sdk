name: npm-pkg-e2e-test

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - feature/*
    paths:
      - .github/workflows/npm-pkg-e2e-test.yml
      - e2e-tests/**
  schedule:
    # UTC 時間で毎日 2:00 (JST で 11:00) に実行、月曜日から金曜日
    - cron: "0 2 * * 1-5"

permissions:
  contents: read

jobs:
  npm-pkg-e2e-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # メンテナンスはおてて
        sdk_version:
          # canary リリースを含める
          - "2025.2.0"
          - "2025.1.0"
          - "2024.2.2"
          - "2024.1.2"
          - "2023.2.0"
          - "2023.1.0"
          - "2022.3.3"
          - "2022.2.0"
          - "2022.1.0"
          - "2021.2.3"
          # 2020.1.7 より前は E2E テストが通らない
          - "2021.1.7"
        node:
          # 30 Apr 2028 End of Life
          - "24"
          # 30 Apr 2027 End of Life
          - "22"
        browser:
          - name: "Google Chrome"
            type: "chrome"
          - name: "Microsoft Edge"
            type: "msedge"
    env:
      VITE_TEST_SIGNALING_URL: ${{ secrets.TEST_SIGNALING_URL }}
      VITE_TEST_CHANNEL_ID_PREFIX: ${{ secrets.TEST_CHANNEL_ID_PREFIX }}
      VITE_TEST_API_URL: ${{ secrets.TEST_API_URL }}
      VITE_TEST_SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      NPM_PKG_E2E_TEST: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ secrets.TS_TAGS }}
          ping: ${{ secrets.TEST_TS_DOMAIN }}
          version: latest
          use-cache: true
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: ${{ matrix.node }}
          # 後段で `vp install --frozen-lockfile` を走らせるため setup-vp の自動 install を無効化する
          run-install: false
      # sora-js-sdk を npm からインストールする
      - run: vp install --frozen-lockfile
      - run: vp add -E sora-js-sdk@${{ matrix.sdk_version }}
        working-directory: ./e2e-tests
      # build しない
      - run: vp exec playwright install ${{ matrix.browser.type }} --with-deps
      - run: vp exec playwright test --project="${{ matrix.browser.name }}"
        env:
          VITE_TEST_CHANNEL_ID_SUFFIX: _${{ github.run_id }}_${{ matrix.node }}
      # - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      #   if: always()
      #   with:
      #     name: playwright-report
      #     path: playwright-report/
      #     retention-days: 30

  slack_notify:
    needs: [npm-pkg-e2e-test]
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-js-sdk
          notify_mode: failure_and_fixed
